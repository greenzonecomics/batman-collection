<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Batman — GZ</title>
<style>
:root{
  --bg:#f0efe9;--bg2:#e8e7e0;
  --border:#ddd;--border2:#e8e5de;
  --text:#1a1a1a;--text2:#555;--text3:#aaa;
  --head-bg:#1a1a1a;
  --vol-on:#f5c518;
  --filter-bg:#fff;--filter-border:#ccc;--filter-text:#555;
  --filter-on-bg:#1a1a1a;--filter-on-text:#fff;
  --thresh-bg:#fffbf0;--thresh-border:#e8d090;
  --goto-bg:#fff;--goto-border:#555;
  --era-text:#aaa;
  --gap-line:#c04040;--gap-text:#b03030;
  --issue-bg:#fff;
  --cgc-color:#0e8c7a;
  --grade-hi:#1a8a3a;--grade-mid:#c07800;--grade-low:#c03000;
  --upg-border:#c07800;--good-border:#2a7a2a;
  --c-direct:#5580d0;--c-news:#d08010;--c-pence:#8050c0;
  --c-canadian:#b83068;--c-mj:#28a060;--c-dcu:#1890c8;
  --c-whitman:#c86020;--c-coverb:#7848d0;--c-coverc:#18a0b0;
  --c-coverd:#c05830;--c-facsim:#888;
  --v-direct:#f0f5ff;--v-news:#fff8ec;--v-pence:#f8f0ff;
  --v-canadian:#fff0f6;--v-mj:#f0fff4;--v-dcu:#e8f4ff;
  --v-whitman:#fff4e8;--v-coverb:#f5f0ff;--v-coverc:#f0fbff;
  --v-coverd:#fff8f0;--v-facsim:#f5f5f5;
}
body.dark{
  --bg:#111;--bg2:#181818;
  --border:#252525;--border2:#202020;
  --text:#f0efe9;--text2:#999;--text3:#484848;
  --filter-bg:#1e1e1e;--filter-border:#333;--filter-text:#666;
  --filter-on-bg:#c07800;--filter-on-text:#fff;
  --thresh-bg:#181000;--thresh-border:#282000;
  --goto-bg:#1e1e1e;--goto-border:#555;
  --era-text:#404040;--gap-line:#a03030;--gap-text:#c06050;
  --issue-bg:#1a1a1a;--cgc-color:#14b89e;
  --grade-hi:#30c060;--grade-mid:#e8a020;--grade-low:#e05050;
  --c-direct:#6898e8;--c-news:#e8a828;--c-pence:#a870e0;
  --c-canadian:#e060a0;--c-mj:#38c078;--c-dcu:#28a8e0;
  --c-whitman:#e07838;--c-coverb:#9060e8;--c-coverc:#28b8c8;
  --c-coverd:#e07048;--c-facsim:#666;
  --v-direct:#0d1422;--v-news:#1a1200;--v-pence:#160d22;
  --v-canadian:#1a0a0a;--v-mj:#091a10;--v-dcu:#081620;
  --v-whitman:#1a1008;--v-coverb:#120d22;--v-coverc:#081820;
  --v-coverd:#1a1208;--v-facsim:#141414;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;max-width:430px;margin:0 auto;transition:background .2s,color .2s}
.sticky-wrap{position:sticky;top:0;z-index:100;background:var(--head-bg)}
.top-bar{padding:7px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a2a2a}
.top-title{font-size:12px;font-weight:700;color:#fff;letter-spacing:.2px;white-space:nowrap;flex-shrink:0}
.goto-input{flex:1;min-width:0;padding:5px 8px;border-radius:7px;border:1.5px solid var(--goto-border);background:var(--goto-bg);color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none}
.goto-input:focus{border-color:var(--cgc-color)}
.goto-btn{padding:5px 10px;border-radius:7px;background:var(--cgc-color);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.theme-btn{background:none;border:1px solid #555;color:#aaa;font-size:11px;padding:4px 8px;border-radius:8px;cursor:pointer;font-weight:600;white-space:nowrap;flex-shrink:0}
.vol-bar{display:flex;border-bottom:2px solid #2a2a2a}
.vol-tab{flex:1;padding:8px 4px;text-align:center;font-size:13px;font-weight:600;color:#555;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.vol-tab.on{color:var(--vol-on);border-bottom-color:var(--vol-on)}
.filter-bar{display:flex;gap:4px;padding:5px 10px;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--filter-border);background:var(--filter-bg);color:var(--filter-text);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px}
.ftab .fdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ftab.on{background:var(--filter-on-bg);color:var(--filter-on-text);border-color:var(--filter-on-bg)}
.ftab.t-upg{border-color:var(--upg-border);color:var(--upg-border)}.ftab.t-upg.on{background:var(--upg-border);color:#fff;border-color:var(--upg-border)}
.ftab.t-miss{border-color:#c04040;color:#c04040}.ftab.t-miss.on{background:#c04040;color:#fff;border-color:#c04040}
.ftab.t-news{border-color:var(--c-news);color:var(--c-news)}.ftab.t-news.on{background:var(--c-news);color:#fff;border-color:var(--c-news)}
.ftab.t-direct{border-color:var(--c-direct);color:var(--c-direct)}.ftab.t-direct.on{background:var(--c-direct);color:#fff;border-color:var(--c-direct)}
.ftab.t-pence{border-color:var(--c-pence);color:var(--c-pence)}.ftab.t-pence.on{background:var(--c-pence);color:#fff;border-color:var(--c-pence)}
.ftab.t-canadian{border-color:var(--c-canadian);color:var(--c-canadian)}.ftab.t-canadian.on{background:var(--c-canadian);color:#fff;border-color:var(--c-canadian)}
.ftab.t-mj{border-color:var(--c-mj);color:var(--c-mj)}.ftab.t-mj.on{background:var(--c-mj);color:#fff;border-color:var(--c-mj)}
.ftab.t-cgc{border-color:var(--cgc-color);color:var(--cgc-color)}.ftab.t-cgc.on{background:var(--cgc-color);color:#fff;border-color:var(--cgc-color)}
.dual-wrap{background:var(--thresh-bg);border-bottom:1px solid var(--thresh-border);padding:8px 12px 10px;display:flex;align-items:center;gap:10px}
.dual-col{flex:1;min-width:0}
.dual-track-wrap{position:relative;height:22px;display:flex;align-items:center}
.dual-track{position:absolute;left:0;right:0;height:4px;border-radius:2px;background:var(--border);pointer-events:none}
.dual-fill{position:absolute;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--grade-low),var(--grade-mid),var(--grade-hi));pointer-events:none}
.dual-track-wrap input[type=range]{position:absolute;left:0;width:100%;height:4px;opacity:0;cursor:pointer;margin:0;-webkit-appearance:none;pointer-events:all}
.dual-track-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;pointer-events:all}
.dual-track-wrap input[type=range]::-moz-range-thumb{width:22px;height:22px;pointer-events:all}
.dual-thumbs{position:absolute;left:0;right:0;pointer-events:none}
.dthumb{position:absolute;width:18px;height:18px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);transform:translateX(-50%);top:50%;margin-top:-9px;pointer-events:none}
.dthumb-lo{background:var(--grade-low)}
.dthumb-hi{background:var(--grade-hi)}
.dual-val{font-size:11px;font-weight:700;white-space:nowrap;min-width:28px;text-align:center}
.dv-lo{color:var(--grade-low)}.dv-hi{color:var(--grade-hi)}
.list{padding:4px 0 80px}
.era-head{padding:13px 12px 4px;font-size:9px;font-weight:700;color:var(--era-text);text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between}
.section-head{padding:14px 12px 4px;font-size:10px;font-weight:700;color:var(--cgc-color);letter-spacing:.4px;border-top:1px solid var(--border)}
.gap-row{display:flex;align-items:center;padding:7px 12px;gap:8px}
.gap-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gap-line),transparent)}
.gap-lbl{font-size:10px;color:var(--gap-text);font-weight:700;white-space:nowrap}
.issue-row{background:var(--issue-bg);margin:1px 0;border-left:3px solid transparent;cursor:pointer}
.issue-row.priority{background:rgba(192,60,0,0.06);border-left-color:var(--upg-border)}
body.dark .issue-row.priority{background:rgba(200,80,30,0.13)}
.issue-row.covered{border-left-color:var(--good-border);opacity:.38}
.issue-row.covered.open{opacity:.65}
.issue-main{display:flex;align-items:center;padding:9px 12px;gap:10px}
.issue-num{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1;color:var(--text);min-width:54px;flex-shrink:0}
.issue-num.priority{color:var(--upg-border)}
.issue-num.ann{font-size:19px}
.issue-mid{flex:1;min-width:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.vdots{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.vd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.vd.solid{opacity:1}.vd.faded{opacity:.22}
.vd-direct  {background:var(--c-direct)}
.vd-news    {background:var(--c-news)}
.vd-pence   {background:var(--c-pence)}
.vd-canadian{background:var(--c-canadian)}
.vd-mj      {background:var(--c-mj)}
.vd-dcu     {background:var(--c-dcu)}
.vd-whitman {background:var(--c-whitman)}
.vd-coverb  {background:var(--c-coverb)}
.vd-coverc  {background:var(--c-coverc)}
.vd-coverd  {background:var(--c-coverd)}
.vd-facsim  {background:var(--c-facsim)}
.ibadge{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600;line-height:1.6;flex-shrink:0}
.b-key{background:#fffae0;color:#806000}
body.dark .b-key{background:#1a1200;color:#f5c518}
.issue-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.issue-grade{font-size:20px;font-weight:700;line-height:1}
.ghi{color:var(--grade-hi)}.gmid{color:var(--grade-mid)}.glow{color:var(--grade-low)}.gcgc{color:var(--cgc-color)}
.expand-btn{font-size:18px;color:var(--text3);transition:transform .2s;width:16px;text-align:center;flex-shrink:0}
.issue-row.open .expand-btn{transform:rotate(90deg)}
.variant-list{display:none;border-top:1px solid var(--border2)}
.issue-row.open .variant-list{display:block}
.variant-row{display:flex;align-items:center;padding:8px 12px 8px 20px;gap:8px;border-bottom:1px solid var(--border2);border-left:3px solid transparent;cursor:pointer}
.variant-row:last-of-type{border-bottom:none}
.variant-row.v-faded{opacity:.28}
.variant-row.v-faded.open{opacity:.55}
.vt-direct  {background:var(--v-direct);  border-left-color:var(--c-direct)}
.vt-news    {background:var(--v-news);    border-left-color:var(--c-news)}
.vt-pence   {background:var(--v-pence);   border-left-color:var(--c-pence)}
.vt-canadian{background:var(--v-canadian);border-left-color:var(--c-canadian)}
.vt-mj      {background:var(--v-mj);      border-left-color:var(--c-mj)}
.vt-dcu     {background:var(--v-dcu);     border-left-color:var(--c-dcu)}
.vt-whitman {background:var(--v-whitman); border-left-color:var(--c-whitman)}
.vt-coverb  {background:var(--v-coverb);  border-left-color:var(--c-coverb)}
.vt-coverc  {background:var(--v-coverc);  border-left-color:var(--c-coverc)}
.vt-coverd  {background:var(--v-coverd);  border-left-color:var(--c-coverd)}
.vt-facsim  {background:var(--v-facsim);  border-left-color:var(--c-facsim)}
.variant-name{flex:1;font-size:12px;color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.variant-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.variant-grade{font-size:13px;font-weight:700}
.vchev{font-size:12px;color:var(--text3);transition:transform .2s;width:12px;text-align:center}
.variant-row.open .vchev{transform:rotate(90deg)}
.copy-list{display:none;border-bottom:1px solid var(--border2)}
.variant-row.open+.copy-list{display:block}
.copy-row{display:flex;justify-content:space-between;align-items:center;padding:5px 14px 5px 32px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border2);background:var(--bg)}
.copy-row:last-child{border-bottom:none}
.copy-right{display:flex;gap:10px;align-items:center}
.copy-grade{font-weight:700;color:var(--text)}
.copy-val{font-size:10px;color:#4a8a4a;font-weight:600}
.empty-msg{padding:20px 12px;color:var(--text2);font-size:13px}
.mcs-row{display:flex;align-items:center;justify-content:flex-end;padding:7px 14px;border-top:1px solid var(--border2)}
.mcs-link{font-size:11px;font-weight:600;color:var(--text3);text-decoration:none;letter-spacing:.2px}
.mcs-link:hover{color:var(--text2)}
</style>
</head>

          <div class="dthumb dthumb-lo" id="dt-lo"></div>
          <div class="dthumb dthumb-hi" id="dt-hi"></div>
        </div>
      </div>
    </div>

  </div>
</div>

var VR={"1":[1,713],"2":[0,52],"3":[1,163],"4":[1,9]};
var ERAS=[{"lbl":"Golden Age","min":1,"max":100},{"lbl":"Silver Age","min":101,"max":260},{"lbl":"Bronze — Pence variants","min":261,"max":339},{"lbl":"Bronze — Direct split begins","min":340,"max":396},{"lbl":"Copper — Multipack zone","min":397,"max":432},{"lbl":"Modern I","min":433,"max":500},{"lbl":"Modern II — Direct gets barcode","min":501,"max":600},{"lbl":"Hush era","min":601,"max":650},{"lbl":"Morrison era — Incentives begin","min":651,"max":713}];
var MCS_TIDS={"1":"98461","2":"22331583","3":"38699396","4":""};

var vol='1', filt='upgrade', lo=4.0, hi=7.5, dark=false;

/* ── Theme ── */
document.getElementById('theme-btn').addEventListener('click',function(){
  dark=!dark;
  document.body.classList.toggle('dark',dark);
  this.textContent=dark?'☀':'☾';
});

/* ── Dual slider ── */
var SMIN=1,SMAX=10;
function dualSync(){
  var loEl=document.getElementById('s-lo');
  var hiEl=document.getElementById('s-hi');
  lo=parseFloat(loEl.value);
  hi=parseFloat(hiEl.value);
  var gap=0.5;
  if(lo>=hi-gap){
    if(document.activeElement===loEl){lo=hi-gap;loEl.value=lo;}
    else{hi=lo+gap;hiEl.value=hi;}
  }
  document.getElementById('dv-lo').textContent=fmtG(lo);
  document.getElementById('dv-hi').textContent=fmtG(hi);
  var plo=(lo-SMIN)/(SMAX-SMIN)*100;
  var phi=(hi-SMIN)/(SMAX-SMIN)*100;
  document.getElementById('dual-fill').style.left=plo+'%';
  document.getElementById('dual-fill').style.width=(phi-plo)+'%';
  document.getElementById('dt-lo').style.left=plo+'%';
  document.getElementById('dt-hi').style.left=phi+'%';
  render();
}
document.getElementById('s-lo').addEventListener('input',dualSync);
document.getElementById('s-hi').addEventListener('input',dualSync);

/* ── Vol tabs ── */
document.getElementById('vol-bar').addEventListener('click',function(e){
  var t=e.target.closest('.vol-tab');
  if(!t)return;
  vol=t.dataset.vol;
  document.querySelectorAll('.vol-tab').forEach(function(x){x.classList.remove('on');});
  t.classList.add('on');
  render();
});

/* ── Filter tabs ── */
document.getElementById('filter-bar').addEventListener('click',function(e){
  var t=e.target.closest('.ftab');
  if(!t)return;
  filt=t.dataset.filt;
  document.querySelectorAll('.ftab').forEach(function(x){x.classList.remove('on');});
  t.classList.add('on');
  render();
});

/* ── Goto ── */
function gotoIssue(){
  var n=parseInt(document.getElementById('goto-input').value,10);
  if(!n)return;
  var items=document.querySelectorAll('[data-n]');
  var best=null,bestDiff=Infinity;
  items.forEach(function(el){
    var en=parseInt(el.dataset.n,10);
    if(isNaN(en))return;
    var diff=Math.abs(en-n);
    if(diff<bestDiff){bestDiff=diff;best=el;}
  });
  if(best){
    var sh=document.querySelector('.sticky-wrap').offsetHeight;
    window.scrollTo({top:best.getBoundingClientRect().top+window.scrollY-sh-6,behavior:'smooth'});
    best.style.outline='2px solid var(--cgc-color)';
    setTimeout(function(){best.style.outline='';},1200);
  }
}
document.getElementById('goto-btn').addEventListener('click',gotoIssue);
document.getElementById('goto-input').addEventListener('keydown',function(e){if(e.key==='Enter')gotoIssue();});

/* ── List click: expand/collapse via delegation ── */
document.getElementById('list').addEventListener('click',function(e){
  var vrow=e.target.closest('.variant-row');
  var irow=e.target.closest('.issue-row');
  if(vrow&&irow){
    e.stopPropagation();
    var cl=vrow.nextElementSibling;
    if(cl&&cl.classList.contains('copy-list')){
      vrow.classList.toggle('open');
      cl.style.display=vrow.classList.contains('open')?'block':'none';
    }
    return;
  }
  if(irow){
    irow.classList.toggle('open');
    if(irow.classList.contains('covered')){
      irow.style.opacity=irow.classList.contains('open')?'0.65':'0.38';
    }
  }
});

/* ── Render helpers ── */
function mcsLink(v,n){
  var tid=MCS_TIDS[v]||'';
  if(tid)return 'https://www.mycomicshop.com/search?TID='+tid+'&ins='+encodeURIComponent(n);
  return 'https://www.mycomicshop.com/search?q=batman+'+encodeURIComponent(n);
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtG(g){
  if(g==null)return '—';
  var s=String(g);
  return s.indexOf('.')<0?s+'.0':s;
}

function gc(g,isCgc){
  if(isCgc)return 'gcgc';
  if(g==null)return '';
  if(g>=hi)return 'ghi';
  if(g>=lo)return 'gmid';
  return 'glow';
}

function coverState(vd){
  for(var i=0;i<vd.length;i++){
    if(vd[i].bg!=null&&vd[i].bg>=hi)return 'covered';
  }
  return 'priority';
}

function issuePass(d){
  if(!d){
    return filt==='missing'||filt==='all';
  }
  if(filt==='missing')return false;
  if(filt==='all')return true;
  var state=coverState(d.vd);
  if(filt==='upgrade')return state==='priority';
  if(filt==='news')   return d.vd.some(function(v){return v.t==='news';});
  if(filt==='direct') return d.vd.some(function(v){return v.t==='direct';});
  if(filt==='pence')  return d.vd.some(function(v){return v.t==='pence';});
  if(filt==='canadian')return d.vd.some(function(v){return v.t==='canadian';});
  if(filt==='mj')     return d.vd.some(function(v){return v.t==='mj';});
  if(filt==='cgc')    return d.cgc;
  if(filt==='98s')    return d.bg!=null&&d.bg>=9.8;
  if(filt==='dupes')  return d.vd.some(function(v){return v.cop.length>1;});
  return false;
}

function mkCopy(cop){
  var stk=cop.stk?'<span class="copy-val">$'+cop.stk+'</span>':'';
  return '<div class="copy-row"><span>'+esc(cop.l)+'</span><div class="copy-right"><span class="copy-grade">'+esc(cop.g)+'</span>'+stk+'</div></div>';
}

function mkVariant(v){
  var isFaded=v.bg!=null&&v.bg>=hi;
  var fadeCls=isFaded?' v-faded':'';
  var gcls=gc(v.bg,v.cgc);
  var grHtml=v.bg!=null?'<span class="variant-grade '+gcls+'">'+fmtG(v.bg)+'</span>':'';
  var copies=v.cop.map(mkCopy).join('');
  return '<div class="variant-row vt-'+v.t+fadeCls+'">'+
    '<span class="variant-name">'+esc(v.n)+'</span>'+
    '<div class="variant-right">'+grHtml+'<span class="vchev">›</span></div>'+
    '</div>'+
    '<div class="copy-list">'+copies+'</div>';
}

function mkIssue(nStr,d,isAnn){
  var state=coverState(d.vd);
  var gcls=d.cgc?'gcgc':'';
  var grHtml=d.bg!=null?'<div class="issue-grade'+(gcls?' '+gcls:'')+'">'+fmtG(d.bg)+'</div>':'';
  var numLbl=isAnn?('Ann '+nStr):nStr;
  var numCls='issue-num'+(state==='priority'?' priority':'')+(isAnn?' ann':'');
  var dots=d.vd.map(function(v){
    var df=(v.bg!=null&&v.bg>=hi)?' faded':' solid';
    return '<span class="vd vd-'+v.t+df+'" title="'+esc(v.n)+'"></span>';
  }).join('');
  var keyBadge=d.ki?'<span class="ibadge b-key">★ Key</span>':'';
  var variants=d.vd.map(mkVariant).join('');
  var mcsHref=mcsLink(vol,nStr);
  var mcsRow='<div class="mcs-row"><a class="mcs-link" href="'+mcsHref+'" target="_blank" rel="noopener">Search MyComicShop ↗</a></div>';
  return '<div class="issue-row '+state+'" data-n="'+esc(nStr)+'">'+
    '<div class="issue-main">'+
    '<div class="'+numCls+'">'+numLbl+'</div>'+
    '<div class="issue-mid"><div class="vdots">'+dots+'</div>'+keyBadge+'</div>'+
    '<div class="issue-right">'+grHtml+'<div class="expand-btn">›</div></div>'+
    '</div>'+
    '<div class="variant-list">'+variants+mcsRow+'</div>'+
    '</div>';
}

function mkGap(from,to){
  var lbl=from===to?'#'+from+' not owned':'#'+from+'–'+to+' not owned';
  return '<div class="gap-row" data-n="'+from+'"><div class="gap-line"></div><span class="gap-lbl">▾ '+lbl+'</span><div class="gap-line"></div></div>';
}

function mkEraHead(era,owned,upg){
  var info=owned+' owned';
  if(filt==='upgrade'&&upg)info+=' · '+upg+' to upgrade';
  return '<div class="era-head"><span>'+esc(era.lbl)+'</span><span>'+info+'</span></div>';
}

/* ── Render annuals/facsimiles section ── */
function appendSk(html,sk,label,isAnn){
  var cat=(LD[vol]||{})[sk]||{};
  var nums=Object.keys(cat).sort(function(a,b){return parseFloat(a)-parseFloat(b);});
  if(!nums.length)return html;
  var content='';
  for(var i=0;i<nums.length;i++){
    var n=nums[i];
    var d=cat[n];
    if(filt==='upgrade'&&coverState(d.vd)!=='priority')continue;
    content+=mkIssue(n,d,isAnn);
  }
  if(!content)return html;
  return html+'<div class="section-head">'+label+'</div>'+content;
}

/* ── Main render ── */
function render(){
  /* annuals/facsimiles-only filters */
  if(filt==='annuals'||filt==='facsimiles'){
    var sk=filt==='annuals'?'annual':'facsimile';
    var isAnn=filt==='annuals';
    var cat=(LD[vol]||{})[sk]||{};
    var nums=Object.keys(cat).sort(function(a,b){return parseFloat(a)-parseFloat(b);});
    var h='';
    for(var i=0;i<nums.length;i++)h+=mkIssue(nums[i],cat[nums[i]],isAnn);
    document.getElementById('list').innerHTML=h||'<p class="empty-msg">No '+(isAnn?'annuals':'facsimiles')+' for Vol. '+vol+'</p>';
    return;
  }

  var cat=(LD[vol]||{})['main']||{};
  var range=VR[vol];
  var useEras=vol==='1';
  var eraList=useEras?ERAS:[{lbl:'',min:range[0],max:range[1]}];
  var html='';

  for(var ei=0;ei<eraList.length;ei++){
    var era=eraList[ei];
    var eraContent='';
    var eraOwned=0,eraUpg=0;
    var eraMin=Math.max(era.min,range[0]);
    var eraMax=Math.min(era.max,range[1]);

    /* Iterate every issue number. Gaps accumulate only for truly missing issues.
       Owned-but-filtered issues (covered in upgrade mode, wrong type in variant filters)
       are skipped silently — they flush a pending gap but don't extend it. */
    var missStart=-1; // start of current run of MISSING (not-in-collection) issues

    for(var n=eraMin;n<=eraMax;n++){
      var d=cat[String(n)];

      if(!d){
        /* truly missing from collection */
        if(missStart<0)missStart=n;
        continue;
      }

      /* owned issue — always ends any pending missing-gap */
      if(missStart>=0){
        eraContent+=mkGap(missStart,n-1);
        missStart=-1;
      }

      if(!issuePass(d))continue; /* owned but filtered (covered, wrong type) — skip silently */

      eraContent+=mkIssue(String(n),d,false);
      eraOwned++;
      if(coverState(d.vd)==='priority')eraUpg++;
    }

    /* flush trailing missing run (only meaningful for all/missing filters) */
    if(missStart>=0&&(filt==='all'||filt==='missing')){
      eraContent+=mkGap(missStart,eraMax);
    }

    if(eraContent){
      if(useEras)html+=mkEraHead(era,eraOwned,eraUpg);
      html+=eraContent;
    }
  }

  /* annuals + facsimiles at end for all/upgrade filters */
  if(filt==='all'||filt==='upgrade'){
    html=appendSk(html,'annual','Annuals',true);
    html=appendSk(html,'facsimile','Facsimiles',false);
  }

  if(!html){
    var allCat=(LD[vol]||{})['main']||{};
    var totalOwned=Object.keys(allCat).length;
    if(filt==='upgrade'&&totalOwned>0){
      html='<p class="empty-msg">All '+totalOwned+' owned issues are above '+fmtG(hi)+' — nothing to upgrade.<br><br>Try <b>All</b> to browse, or drag the ceiling lower.</p>';
    } else {
      html='<p class="empty-msg">Nothing matches.</p>';
    }
  }
  document.getElementById('list').innerHTML=html;
}

/* ── Init ── */
dualSync();
</script>
